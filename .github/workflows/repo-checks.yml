name: Repo checks

on:
  push:
  pull_request:

jobs:
  public-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify skill structure
        run: |
          test -f skills/nontechnical-codex-project-controller/SKILL.md
          test -f skills/nontechnical-codex-project-controller/agents/openai.yaml
          test -f skills/nontechnical-project-readiness-auditor/SKILL.md
          test -f skills/nontechnical-project-readiness-auditor/agents/openai.yaml
          test -f scripts/install.ps1
          test -f scripts/install.sh
          test -f examples/clinic-booking-system.en.md
          test -f prompts/05-quick-daily-task.md
          test -f prompts/06-full-project-task.md
          test -f prompts/07-high-risk-task.md
          test -f scripts/package_release.py

      - name: Validate skill frontmatter
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in Path("skills").glob("*/SKILL.md"):
              text = path.read_text(encoding="utf-8")
              if not text.startswith("---\n"):
                  raise SystemExit(f"{path} missing YAML frontmatter")
              end = text.find("\n---", 4)
              if end == -1:
                  raise SystemExit(f"{path} missing frontmatter end")
              frontmatter = text[4:end]
              name_line = f"name: {path.parent.name}"
              if name_line not in frontmatter:
                  raise SystemExit(f"{path} name must match folder: {name_line}")
              if "description:" not in frontmatter:
                  raise SystemExit(f"{path} missing description")
          PY

      - name: Validate install scripts
        run: |
          bash -n scripts/install.sh
          bash scripts/install.sh --dry-run --target /tmp/codex-for-humans-skills
          bash scripts/install.sh --target /tmp/codex-for-humans-skills
          test -f /tmp/codex-for-humans-skills/nontechnical-codex-project-controller/SKILL.md
          test -f /tmp/codex-for-humans-skills/nontechnical-project-readiness-auditor/SKILL.md

      - name: Validate PowerShell install dry-run
        shell: pwsh
        run: |
          ./scripts/install.ps1 -DryRun -TargetPath /tmp/codex-for-humans-pwsh-skills

      - name: Validate release zip packaging
        run: |
          python scripts/package_release.py --root . --output /tmp/codex-for-humans-check.zip
          python - <<'PY'
          import zipfile
          with zipfile.ZipFile("/tmp/codex-for-humans-check.zip") as z:
              names = z.namelist()
          if any("\\" in name for name in names):
              raise SystemExit("Release zip contains backslash path separators")
          PY

      - name: Validate release packaging excludes local private files
        run: |
          mkdir -p .codex/sessions .agents/skills logs output reports/private
          echo "DUMMY=example" > .env
          echo "private" > .codex/sessions/session.txt
          echo "private" > .agents/skills/private.txt
          echo "private" > logs/run.log
          echo "private" > output/debug.txt
          echo "private" > reports/private/report.txt
          echo "archive" > old.zip
          python scripts/package_release.py --root . --output /tmp/codex-for-humans-dirty-check.zip
          python - <<'PY'
          import zipfile

          forbidden = {
              ".env",
              ".codex/sessions/session.txt",
              ".agents/skills/private.txt",
              "logs/run.log",
              "output/debug.txt",
              "reports/private/report.txt",
              "old.zip",
              "codex-for-humans-dirty-check.zip",
          }
          with zipfile.ZipFile("/tmp/codex-for-humans-dirty-check.zip") as z:
              names = set(z.namelist())
          bad = sorted(forbidden & names)
          if bad:
              raise SystemExit(f"Release zip included forbidden files: {bad}")
          PY

      - name: Check public wording boundaries
        run: |
          ! grep -R --exclude='*.gif' "codex-web-gpt-broker" -n README.md docs prompts skills templates examples SECURITY.md scripts
          ! grep -R --exclude='*.gif' "下一步指令" -n README.md docs prompts skills templates examples SECURITY.md scripts

      - name: Check common mojibake markers
        run: |
          ! grep -R --exclude='*.gif' "鈹\|灏\|绺\|锛\|鍊\|闋\|瑭\|銆\|�" -n README.md docs prompts skills templates examples SECURITY.md scripts

      - name: Check common secret-shaped patterns
        run: |
          ! grep -R --exclude='*.gif' -E "sk-[A-Za-z0-9_-]{20,}|gh[pousr]_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH|DSA|EC|PRIVATE) KEY" README.md docs prompts skills templates examples SECURITY.md scripts

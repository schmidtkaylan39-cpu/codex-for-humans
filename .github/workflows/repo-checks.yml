name: Repo checks

on:
  push:
  pull_request:

jobs:
  public-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify skill structure
        run: |
          test -f skills/nontechnical-codex-project-controller/SKILL.md
          test -f skills/nontechnical-codex-project-controller/agents/openai.yaml
          test -f skills/nontechnical-project-readiness-auditor/SKILL.md
          test -f skills/nontechnical-project-readiness-auditor/agents/openai.yaml
          test -f scripts/install.ps1
          test -f scripts/install.sh
          test -f examples/clinic-booking-system.en.md
          test -f prompts/05-quick-daily-task.md
          test -f prompts/06-full-project-task.md
          test -f prompts/07-high-risk-task.md

      - name: Check public wording boundaries
        run: |
          ! grep -R --exclude='*.gif' "codex-web-gpt-broker" -n README.md docs prompts skills templates examples SECURITY.md scripts
          ! grep -R --exclude='*.gif' "下一步指令" -n README.md docs prompts skills templates examples SECURITY.md scripts

      - name: Check common mojibake markers
        run: |
          ! grep -R --exclude='*.gif' "鈹\|灏\|绺\|锛\|鍊\|闋\|瑭\|銆\|�" -n README.md docs prompts skills templates examples SECURITY.md scripts

      - name: Check common secret-shaped patterns
        run: |
          ! grep -R --exclude='*.gif' -E "sk-[A-Za-z0-9_-]{20,}|gh[pousr]_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH|DSA|EC|PRIVATE) KEY" README.md docs prompts skills templates examples SECURITY.md scripts

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Codex for Humans 教學封面</title>
  <desc id="desc">給非技術新手使用 Codex 的教學封面圖</desc>
  <rect width="1200" height="630" fill="#f7fafc"/>
  <rect x="0" y="0" width="1200" height="630" fill="#ffffff"/>
  <circle cx="1080" cy="105" r="88" fill="#e0f2fe"/>
  <circle cx="120" cy="520" r="120" fill="#ecfdf5"/>
  <rect x="70" y="70" width="1060" height="490" rx="28" fill="#ffffff" stroke="#d8dee9" stroke-width="3"/>
  <text x="110" y="150" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="34" fill="#0f766e" font-weight="700">Codex for Humans</text>
  <text x="110" y="232" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="64" fill="#111827" font-weight="800">小白也能用 Codex</text>
  <text x="110" y="305" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="38" fill="#374151">從想法到交付，用流程和證據前進</text>
  <g transform="translate(110 370)">
    <rect width="250" height="72" rx="18" fill="#0f766e"/>
    <text x="125" y="47" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" fill="#ffffff" font-weight="700">0-1 開發</text>
  </g>
  <g transform="translate(390 370)">
    <rect width="280" height="72" rx="18" fill="#2563eb"/>
    <text x="140" y="47" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" fill="#ffffff" font-weight="700">70-100 稽核</text>
  </g>
  <g transform="translate(700 370)">
    <rect width="300" height="72" rx="18" fill="#7c3aed"/>
    <text x="150" y="47" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" fill="#ffffff" font-weight="700">Web GPT 外審</text>
  </g>
  <text x="110" y="510" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" fill="#4b5563">不是魔法 prompt，是非技術負責人的專案總控 SOP</text>
</svg>

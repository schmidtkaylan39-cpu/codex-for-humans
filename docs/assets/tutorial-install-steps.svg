<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">安裝步驟圖</title>
  <desc id="desc">Codex for Humans 的新手安裝步驟：找資料夾、dry-run、安裝、重開 Codex、驗證 Skill</desc>
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="600" y="72" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="42" font-weight="800" fill="#111827">5 步安裝 Codex for Humans</text>
  <g transform="translate(90 145)">
    <rect width="190" height="330" rx="22" fill="#f0fdfa" stroke="#0f766e" stroke-width="3"/>
    <circle cx="95" cy="70" r="34" fill="#0f766e"/>
    <text x="95" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff">1</text>
    <text x="95" y="135" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" font-weight="800" fill="#134e4a">找 Skills</text>
    <text x="95" y="180" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#134e4a">看 Codex 顯示的</text>
    <text x="95" y="212" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#134e4a">Skills 資料夾</text>
  </g>
  <g transform="translate(300 145)">
    <rect width="190" height="330" rx="22" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="95" cy="70" r="34" fill="#2563eb"/>
    <text x="95" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff">2</text>
    <text x="95" y="135" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" font-weight="800" fill="#1e3a8a">先 Dry-run</text>
    <text x="95" y="180" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#1e3a8a">只看計畫</text>
    <text x="95" y="212" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#1e3a8a">不複製檔案</text>
  </g>
  <g transform="translate(510 145)">
    <rect width="190" height="330" rx="22" fill="#fefce8" stroke="#ca8a04" stroke-width="3"/>
    <circle cx="95" cy="70" r="34" fill="#ca8a04"/>
    <text x="95" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff">3</text>
    <text x="95" y="135" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" font-weight="800" fill="#713f12">正式安裝</text>
    <text x="95" y="180" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#713f12">只複製兩個</text>
    <text x="95" y="212" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#713f12">Skill 資料夾</text>
  </g>
  <g transform="translate(720 145)">
    <rect width="190" height="330" rx="22" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
    <circle cx="95" cy="70" r="34" fill="#7c3aed"/>
    <text x="95" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff">4</text>
    <text x="95" y="135" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" font-weight="800" fill="#4c1d95">重開 Codex</text>
    <text x="95" y="180" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#4c1d95">讓 Codex</text>
    <text x="95" y="212" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#4c1d95">重新讀取 Skill</text>
  </g>
  <g transform="translate(930 145)">
    <rect width="190" height="330" rx="22" fill="#fff1f2" stroke="#e11d48" stroke-width="3"/>
    <circle cx="95" cy="70" r="34" fill="#e11d48"/>
    <text x="95" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff">5</text>
    <text x="95" y="135" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" font-weight="800" fill="#881337">驗證可用</text>
    <text x="95" y="180" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#881337">輸入 $</text>
    <text x="95" y="212" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#881337">看到兩個 Skill</text>
  </g>
  <text x="600" y="585" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="27" fill="#374151">安全提醒：只從可信 repo 執行安裝腳本，先 dry-run，再確認目標路徑</text>
</svg>

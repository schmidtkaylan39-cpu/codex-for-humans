<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">證據迴圈圖</title>
  <desc id="desc">Codex for Humans 的證據導向工作循環：任務合約、最小修改、本機驗證、交付判斷、交接紀錄</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="42" font-weight="800" fill="#111827">不要只看分數，要看證據</text>
  <g fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M600 150 C780 150 930 300 930 470"/>
    <path d="M930 470 C930 590 780 640 600 640"/>
    <path d="M600 640 C420 640 270 590 270 470"/>
    <path d="M270 470 C270 300 420 150 600 150"/>
  </g>
  <polygon points="930,470 910,428 952,436" fill="#64748b"/>
  <polygon points="600,640 644,622 638,666" fill="#64748b"/>
  <polygon points="270,470 248,510 226,470" fill="#64748b"/>
  <polygon points="600,150 558,132 564,176" fill="#64748b"/>
  <g transform="translate(460 110)">
    <rect width="280" height="95" rx="18" fill="#ecfdf5" stroke="#0f766e" stroke-width="3"/>
    <text x="140" y="40" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="25" font-weight="800" fill="#0f766e">1. 任務合約</text>
    <text x="140" y="72" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#134e4a">先定目標和範圍</text>
  </g>
  <g transform="translate(780 330)">
    <rect width="290" height="95" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <text x="145" y="40" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="25" font-weight="800" fill="#1d4ed8">2. 最小修改</text>
    <text x="145" y="72" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#1e3a8a">一次只推進一段</text>
  </g>
  <g transform="translate(455 545)">
    <rect width="290" height="95" rx="18" fill="#fefce8" stroke="#ca8a04" stroke-width="3"/>
    <text x="145" y="40" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="25" font-weight="800" fill="#854d0e">3. 本機驗證</text>
    <text x="145" y="72" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#713f12">測試、建置、截圖</text>
  </g>
  <g transform="translate(130 330)">
    <rect width="290" height="95" rx="18" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
    <text x="145" y="40" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="25" font-weight="800" fill="#6d28d9">4. 交付判斷</text>
    <text x="145" y="72" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#4c1d95">阻塞點比分數重要</text>
  </g>
  <rect x="395" y="285" width="410" height="145" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="600" y="335" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="30" font-weight="800" fill="#111827">完成不是一句話</text>
  <text x="600" y="382" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" fill="#374151">要有可重現的本機證據</text>
</svg>

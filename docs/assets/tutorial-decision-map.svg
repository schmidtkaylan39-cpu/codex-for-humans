<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">0-1 與 70-100 分流圖</title>
  <desc id="desc">協助新手判斷要使用 Project Controller、Readiness Auditor 或 Web GPT 外部審查</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="42" font-weight="800" fill="#111827">我現在該用哪個 Skill？</text>
  <rect x="440" y="115" width="320" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="600" y="170" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700" fill="#111827">先判斷專案階段</text>
  <path d="M600 205 L260 285" stroke="#94a3b8" stroke-width="4" fill="none"/>
  <path d="M600 205 L600 285" stroke="#94a3b8" stroke-width="4" fill="none"/>
  <path d="M600 205 L940 285" stroke="#94a3b8" stroke-width="4" fill="none"/>
  <g transform="translate(80 285)">
    <rect width="360" height="260" rx="24" fill="#ecfdf5" stroke="#0f766e" stroke-width="3"/>
    <text x="180" y="55" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="30" font-weight="800" fill="#0f766e">還沒做出來</text>
    <text x="180" y="105" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" fill="#134e4a">新專案 / 新功能 / 修大 bug</text>
    <rect x="42" y="145" width="276" height="62" rx="14" fill="#0f766e"/>
    <text x="180" y="185" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" fill="#ffffff" font-weight="700">Project Controller</text>
    <text x="180" y="235" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="21" fill="#134e4a">負責規劃、開發、測試</text>
  </g>
  <g transform="translate(420 285)">
    <rect width="360" height="260" rx="24" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <text x="180" y="55" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="30" font-weight="800" fill="#1d4ed8">已經快完成</text>
    <text x="180" y="105" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" fill="#1e3a8a">看起來 70-90 分</text>
    <rect x="42" y="145" width="276" height="62" rx="14" fill="#2563eb"/>
    <text x="180" y="185" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" fill="#ffffff" font-weight="700">Readiness Auditor</text>
    <text x="180" y="235" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="21" fill="#1e3a8a">找未測、阻塞、風險</text>
  </g>
  <g transform="translate(760 285)">
    <rect width="360" height="260" rx="24" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
    <text x="180" y="55" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="30" font-weight="800" fill="#6d28d9">想找外部挑錯</text>
    <text x="180" y="105" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" fill="#4c1d95">高風險 / 最終審查</text>
    <rect x="42" y="145" width="276" height="62" rx="14" fill="#7c3aed"/>
    <text x="180" y="185" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" fill="#ffffff" font-weight="700">Web GPT 外部意見</text>
    <text x="180" y="235" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="21" fill="#4c1d95">不能取代本機證據</text>
  </g>
  <text x="600" y="640" text-anchor="middle" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700" fill="#111827">核心原則：Codex 本機執行，本機證據決定完成</text>
</svg>
